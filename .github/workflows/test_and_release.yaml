name: Build Fortran, test it, and optionally publish test outputs
permissions:
  contents: write   # allow uploading assets to a release

on:
  push:
    branches:
      - amica-python
  pull_request:
    branches:
      - amica-python
  release:
    types: [published]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out this repository
        uses: actions/checkout@v5

      - name: Setup Fortran
        uses: fortran-lang/setup-fortran@v1
        with:
          compiler: gcc
          version: latest

      - name: Install dependencies needed for compilation
        run: |
          sudo apt-get update
          sudo apt-get install -y make \
            libblas-dev liblapack-dev \
            openmpi-bin libopenmpi-dev
      
      - name: Build Fortran program
        run: |
          make

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scipy

      - name: Download test data
        run: |
          curl -L -o tests/eeglab_sample_data/eeglab_data.fdt https://github.com/sccn/eeglab/raw/develop/sample_data/eeglab_data.fdt
          curl -L -o tests/eeglab_sample_data/eeglab_data.set https://github.com/sccn/eeglab/raw/develop/sample_data/eeglab_data.set
          ls -lh tests/eeglab_sample_data/eeglab_data.*
      
      - name: Generate simulated test data
        run: |
          python tools/simulate_data.py --n-samples 10000 --mix-signals --noise-factor 0.05 --output tests/toy_1/toy_1.bin
          ls -lh tests/toy_1/toy_1.bin
          echo "Toy 1 data generated"
          python tools/simulate_data.py --n-samples 5000 --mix-signals --output tests/toy_2/toy_2.bin
          ls -lh tests/toy_2/toy_2.bin
          echo "Toy 2 data generated"
          python tools/generate_sklearn_tut_data.py --output tests/sklearn_tutorial_data/sklearn_tutorial_data.bin
          ls -lh tests/sklearn_tutorial_data/sklearn_tutorial_data.bin
          echo "Sklearn tutorial data generated"

      - name: Run test datasets
        run: |
          echo "Running EEGLab Sample data test (32 Components with approximate sphere)"
          ./amica15ub_test ./tests/eeglab_sample_data/amicadefs_test.param
          echo "Testing All components (32) with direct sphere"
          ./amica15ub_test ./tests/eeglab_sample_data/amicadefs_test_direct_sphere.param
          echo "Testing Dimension Reduction with Approximate Sphere"
          ./amica15ub_test ./tests/eeglab_sample_data/amicadefs_dimension_reduction_approx_sphere.param
          echo "Testing Dimension Reduction with Direct Sphere"
          ./amica15ub_test ./tests/eeglab_sample_data/amicadefs_dimension_reduction_direct_sphere.param
          echo "Running toy_1 (mixed signals)"
          ./amica15ub_test ./tests/toy_1/amicadefs_toy_1.param
          echo "Running toy_2 (unmixed signals)"
          ./amica15ub_test ./tests/toy_2/amicadefs_toy_2.param
          echo "Running sklearn tutorial data"
          ./amica15ub_test ./tests/sklearn_tutorial_data/newton/amicadefs_sklearn_tutorial_data.param
          ./amica15ub_test ./tests/sklearn_tutorial_data/SGD/amicadefs_sklearn_tutorial_data.param


      # Always upload artifact for CI consumption
      - name: Archive test outputs
        run: tar -czf test_output.tar.gz -C tests toy_1 toy_2 eeglab_sample_data sklearn_tutorial_data
      - name: Upload Fortran test output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: fortran-test-output
          path: test_output.tar.gz
      
      # Attach test outputs to release when we cut one
      - name: Upload Fortran test output to release
        if: github.event_name == 'release' && github.event.action == 'published'
        uses: softprops/action-gh-release@v2
        with:
          files: test_output.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
