name: Build Fortran, test it, and optionally publish test outputs
permissions:
  contents: write   # allow uploading assets to a release

on:
  push:
    branches:
      - amica-python
  pull_request:
    branches:
      - amica-python
  release:
    types: [published]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out this repository
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran make \ 
            libopenblas-dev libblas-dev liblapack-dev \
            openmpi-bin libopenmpi-dev
      
      - name: Build Fortran program
        run: |
          make
      
      - name: Run canonical test dataset
        run: |
          mkdir amicaout_test
          ./amica_dev amicadefs_test.param
      
      # Always upload artifact for CI consumption
      - name: Upload Fortran test output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: fortran-test-output
          path: amicaout_test
      
      # Attach to release if this was a release event
      - name: Upload Fortran test output to release
        if: github.event_name == 'release' && github.event.action == 'published'
        uses: softprops/action-gh-release@v2
        with:
          files: amicaout_test/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
